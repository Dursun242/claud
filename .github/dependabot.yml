version: 2
updates:
  # Dépendances npm — MAJ hebdo, groupées par type pour éviter le bruit.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Sécurité : urgent, PR même en jours ouvrés
      security:
        applies-to: security-updates
        patterns: ["*"]
      # Dev deps : batché
      dev-dependencies:
        dependency-type: "development"
      # Prod deps : batché aussi, patches uniquement
      prod-patches:
        dependency-type: "production"
        update-types: ["patch"]
    labels:
      - "dependencies"

  # Actions GitHub elles-mêmes
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
